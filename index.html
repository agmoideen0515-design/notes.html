<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക്</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }
        .notebook-page {
            background-color: white;
            width: 95%; /* ഫോണിൽ കൃത്യമായി വരാൻ */
            max-width: 210mm;
            min-height: 297mm;
            padding: 40px 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            border-right: 4px solid #ff4d4d; /* ചുവന്ന മാർജിൻ */
        }
        /* വരകൾ വരിയുടെ താഴെ ഭാഗത്ത് വരാൻ */
        .content-area {
            line-height: 2.2; /* വരികൾക്കിടയിലെ അകലം */
            background-image: linear-gradient(transparent 95%, #d1d1d1 5%);
            background-size: 100% 2.2em;
            outline: none;
            min-height: 900px;
            font-size: 22pt; /* അക്ഷരങ്ങളുടെ വലിപ്പം */
            text-align: right;
            padding-right: 15px;
            padding-left: 15px;
            color: #222;
            word-wrap: break-word;
        }
        /* ക്ലിക്ക് ചെയ്യുമ്പോൾ ടെക്സ്റ്റ് മാറാൻ */
        .content-area:empty:before {
            content: "ഇവിടെ ടൈപ്പ് ചെയ്യുക...";
            color: #ccc;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .lesson-title {
            font-size: 20pt;
            flex-grow: 1;
            border-bottom: 1px dashed #999;
            outline: none;
        }
        .date-section {
            font-size: 14pt;
            min-width: 120px;
            text-align: left;
            outline: none;
        }
        .controls {
            margin-bottom: 15px;
            width: 100%;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { 
                width: 100%; 
                box-shadow: none; 
                border-right: 4px solid #ff4d4d; 
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് / PDF സേവ് ചെയ്യുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <div class="lesson-title" contenteditable="true" data-placeholder="പാഠം...">....................................</div>
            <div class="date-section" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>

        <div class="content-area" contenteditable="true"></div>
    </div>

</body>
</html>
