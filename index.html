<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .notebook-page {
            background-color: white;
            width: 98%;
            max-width: 210mm;
            min-height: 297mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            /* വലതുവശത്തെ ചുവന്ന മാർജിൻ ലൈൻ */
            border-right: 60px solid white;
            padding-top: 40px;
        }

        /* മാർജിൻ ലൈൻ വരയ്ക്കാൻ */
        .notebook-page::after {
            content: "";
            position: absolute;
            top: 0;
            right: 58px;
            bottom: 0;
            width: 2px;
            background-color: #ff4d4d;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px 10px 60px;
            margin-bottom: 20px;
        }

        .lesson-title {
            font-size: 20pt;
            flex-grow: 1;
            outline: none;
            text-align: right;
            font-family: 'Amiri', serif;
        }

        .date-section {
            font-size: 14pt;
            outline: none;
            text-align: left;
        }

        /* ടൈപ്പ് ചെയ്യുന്ന ഭാഗം */
        .content-area {
            line-height: 2.2; 
            outline: none;
            min-height: 900px;
            font-size: 24pt;
            font-family: 'Amiri', serif;
            text-align: right;
            /* മാർജിന് ഇടത്തോട്ട് എഴുത്ത് വരാൻ */
            padding: 0 10px 0 60px;
            color: #222;
            word-wrap: break-word;
        }

        /* ക്ലിക്ക് ചെയ്യുമ്പോൾ മാറാൻ */
        .content-area:empty:before {
            content: "ഇവിടെ ടൈപ്പ് ചെയ്യുക...";
            color: #ccc;
            font-family: sans-serif;
            font-size: 16pt;
        }

        .controls { margin: 10px 0; }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് / PDF സേവ് ചെയ്യുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <div class="lesson-title" contenteditable="true">..........................................</div>
            <div class="date-section" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>

        <div class="content-area" contenteditable="true"></div>
    </div>

</body>
</html>
