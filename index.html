<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ നോട്ട്ബുക്ക് - വരികളില്ലാത്തത്</title>
    <style>
        /* അറബി അക്ഷരങ്ങൾ ഭംഗിയായി വരാൻ */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .notebook-page {
            background-color: white;
            width: 95%;
            max-width: 210mm;
            min-height: 297mm;
            padding: 50px 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            /* വലതുവശത്തെ ചുവന്ന മാർജിൻ */
            border-right: 5px solid #ff4d4d;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            padding: 0 30px 20px 80px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .lesson-title {
            font-size: 24pt;
            flex-grow: 1;
            outline: none;
            text-align: right;
            font-family: 'Amiri', serif;
        }

        .date-section {
            font-size: 16pt;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        /* എഴുതുന്ന ഭാഗം */
        .content-area {
            line-height: 2.5; /* വരികൾ തമ്മിലുള്ള അകലം */
            outline: none;
            min-height: 900px;
            font-size: 26pt; /* അക്ഷരങ്ങളുടെ വലിപ്പം */
            font-family: 'Amiri', serif;
            text-align: right;
            padding: 0 20px 0 80px;
            color: #222;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* ശൂന്യമായിരിക്കുമ്പോൾ കാണാൻ */
        .content-area:empty:before {
            content: "ഇവിടെ എഴുതി തുടങ്ങാം...";
            color: #ddd;
            font-family: sans-serif;
            font-size: 18pt;
        }

        .controls {
            margin-bottom: 15px;
        }

        button {
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .notebook-page { 
                width: 100%; 
                box-shadow: none; 
                border-right: 5px solid #ff4d4d !important;
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="window.print()">പ്രിന്റ് / PDF സേവ് ചെയ്യുക</button>
    </div>

    <div class="notebook-page">
        <div class="header-section">
            <div class="lesson-title" contenteditable="true">................................................</div>
            <div class="date-section" contenteditable="true">തിയ്യതി: ..../..../2026</div>
        </div>

        <div class="content-area" contenteditable="true"></div>
    </div>

</body>
</html>
